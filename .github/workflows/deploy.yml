name: Deploy to GitHub Pages

# DEPRECATED: production is Vercel (reverseengineering.agencyadvanta.com) with a
# root absolute base + SPA rewrite. The app no longer builds for the GitHub Pages
# project SUBPATH (vite base is now '/'), so this workflow is manual-only to avoid
# publishing a broken build on every push. Re-enable the `push` trigger only if you
# also restore a subpath base in vite.config.ts.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
