# nginx site for reverseengineering.agencyadvanta.com
#
# Install on the host (NOT in Docker):
#   sudo cp deploy/nginx/reverseengineering.agencyadvanta.com.conf \
#           /etc/nginx/sites-available/reverseengineering.agencyadvanta.com
#   sudo ln -sf /etc/nginx/sites-available/reverseengineering.agencyadvanta.com \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d reverseengineering.agencyadvanta.com
#
# certbot adds the listen 443 / ssl_certificate lines and an http->https
# redirect in place. The location blocks below are preserved across that edit.

server {
    listen 80;
    listen [::]:80;
    server_name reverseengineering.agencyadvanta.com;

    # Markdown payloads to /api/publish can be up to ~200kb.
    client_max_body_size 2m;

    # The Notion publish call paginates large pages (was maxDuration 60s on
    # Vercel) — give it room before nginx times out the upstream.
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static SPA + client-side routes.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
